      <div class="brand-name">BarberShop</div>
      <div class="brand-sub">{{ isRegister() ? 'Crie sua conta' : 'Faça login para continuar' }}</div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab" [class.active]="mode() === 'login'" (click)="setMode('login')">
        Entrar
      </button>
      <button class="mode-tab" [class.active]="mode() === 'register'" (click)="setMode('register')">
        Cadastrar
      </button>
    </div>

    <div class="form-section">

      @if (isRegister()) {
      <div class="field">
        <label class="field-label">Nome Completo</label>
        <input class="field-input" type="text" placeholder="Digite seu nome completo" [value]="fullName()"
          (input)="fullName.set($any($event.target).value)" (blur)="touch('fullName')" />
        @if (fullNameError()) {
        <span class="field-error">{{ fullNameError() }}</span>
        }
      </div>

      <div class="field">
        <label class="field-label">Telefone</label>
        <input class="field-input" type="tel" placeholder="Digite seu telefone" [value]="phoneNumber()"
          (input)="phoneNumber.set($any($event.target).value)" (blur)="touch('phoneNumber')" />
        @if (phoneNumberError()) {
        <span class="field-error">{{ phoneNumberError() }}</span>
        }
      </div>
      }

      <div class="field">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" placeholder="Digite seu email" [value]="email()"
          (input)="email.set($any($event.target).value)" (blur)="touch('email')" />
        @if (emailError()) {
        <span class="field-error">{{ emailError() }}</span>
        }
      </div>

      <div class="field">
        <label class="field-label">Senha</label>
        <input class="field-input" type="password"
          [placeholder]="isRegister() ? 'Crie uma senha (mín. 6 caracteres)' : 'Digite sua senha'" [value]="password()"
          (input)="password.set($any($event.target).value)" (blur)="touch('password')" />
        @if (passwordError()) {
        <span class="field-error">{{ passwordError() }}</span>
        }
      </div>

      <button class="submit-btn" [disabled]="isLoading()" (click)="submit()">
        @if (isLoading()) {
        <ion-spinner name="crescent" />
        } @else {
        {{ isRegister() ? 'Criar conta' : 'Entrar' }}
        }
      </button>

    </div>

  </div>
</ion-content>
